name: Bug report
description: Report a reproducible problem in Block Reference Enhancer
title: "[Bug]: "
labels:
  - bug
body:
  - type: checkboxes
    id: checks
    attributes:
      label: Before submitting
      options:
        - label: I searched existing issues.
          required: true
        - label: I tested the latest released version.
          required: true
  - type: input
    id: plugin-version
    attributes:
      label: Plugin version
      placeholder: 1.3.0
    validations:
      required: true
  - type: input
    id: obsidian-version
    attributes:
      label: Obsidian version
      placeholder: 1.8.x
    validations:
      required: true
  - type: dropdown
    id: platform
    attributes:
      label: Platform
      options:
        - Windows
        - macOS
        - Linux
        - iOS
        - Android
    validations:
      required: true
  - type: checkboxes
    id: modes
    attributes:
      label: Where does the issue happen?
      options:
        - label: Live Preview
        - label: Reading Mode
  - type: textarea
    id: steps
    attributes:
      label: Reproduction steps
      description: List exact steps so the problem can be reproduced.
      placeholder: |
        1. Open note ...
        2. Paste ...
        3. Run command ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected result
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual result
    validations:
      required: true
  - type: textarea
    id: sample
    attributes:
      label: Minimal Markdown sample
      description: Redact private content before posting.
      render: markdown
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Console errors or screenshots
      description: Paste console errors or attach screenshots if available.
  - type: checkboxes
    id: privacy
    attributes:
      label: Privacy check
      options:
        - label: I removed or redacted private note content.
          required: true
